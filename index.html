<!DOCTYPE html>
<html>

<head>
    <title>MSTR Advanced DAT Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            padding: 30px;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .status-box {
            margin: 20px 0;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2em;
        }

        .premium {
            background: #d4edda;
            color: #155724;
        }

        .discount {
            background: #f8d7da;
            color: #721c24;
        }

        button {
            padding: 10px 25px;
            font-size: 16px;
            cursor: pointer;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>MicroStrategy (MSTR) DAT Analytics</h1>
        <button onclick="loadAnalytics()">Generate 30-Day Report</button>
        <div id="statusIndicator" class="status-box" style="display:none;"></div>
        <canvas id="historyChart" style="margin-top:20px;"></canvas>
        <button onclick="loadAnalytics()">Generate 30-Day Report</button>
        <button id="reportBtn" onclick="runFullAnalysis()">Generate 30-Day Report</button>
    </div>

    <div id="aiSection" style="margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px;">
        <h3>🤖 AI Market Insight</h3>
        <div id="aiContent" style="font-style: italic; color: #555; line-height: 1.6;">
            Click the button above to generate AI analysis...
        </div>
        
    </div>



    <script>
        let myChart = null;

        async function loadAnalytics() {
            const response = await fetch('https://mstr-monitor.onrender.com/api/history');
            const data = await response.json();
            const latest = data[data.length - 1];

            // 1. Conditional Logic for Premium/Discount
            const indicator = document.getElementById('statusIndicator');
            indicator.style.display = 'block';

            if (latest.ratio > 1) {
                const perc = ((latest.ratio - 1) * 100).toFixed(2);
                indicator.className = 'status-box premium';
                indicator.innerText = `STATUS: PREMIUM (${perc}% Over BTC Value)`;
            } else {
                const perc = ((1 - latest.ratio) * 100).toFixed(2);
                indicator.className = 'status-box discount';
                indicator.innerText = `STATUS: DISCOUNT (${perc}% Under BTC Value)`;
            }

            // 2. Charting Logic
            const ctx = document.getElementById('historyChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.date),
                    datasets: [{
                        label: 'MSTR Stock Price',
                        data: data.map(d => d.mstr_price),
                        borderColor: '#007bff',
                        fill: false
                    }, {
                        label: 'NAV per Share',
                        data: data.map(d => d.nav_per_share),
                        borderColor: '#28a745',
                        fill: false
                    }]
                },
                options: { responsive: true, plugins: { title: { display: true, text: 'Stock Price vs. Net Asset Value (30D)' } } }
            });
            
        }

        async function getAISummary() {
                const aiDiv = document.getElementById('aiContent');
                aiDiv.innerText = "Generating insights using Gemini AI...";

                try {
                    const response = await fetch('https://mstr-monitor.onrender.com/api/ai-summary');
                    const data = await response.json();
                    aiDiv.innerText = data.summary;
                } catch (e) {
                    aiDiv.innerText = "Error connecting to AI service.";
                }
            }

        async function runFullAnalysis() {
            const btn = document.getElementById('reportBtn');

            // 1. Enter "Running" State
            btn.disabled = true;
            btn.innerText = "Running...";
            btn.style.opacity = "0.7";
            btn.style.cursor = "not-allowed";

            try {
                await Promise.all([
                    loadAnalytics(),
                    getAISummary()
                ]);
            } catch (error) {
                console.error("Analysis execution failed:", error);
                alert("An error occurred during data retrieval.");
            } finally {
                // 3. Restore Original State
                btn.disabled = false;
                btn.innerText = "Generate 30-Day Report";
                btn.style.opacity = "1";
                btn.style.cursor = "pointer";
            }
        }

    </script>
</body>

</html>
